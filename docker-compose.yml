version: '3.8'
services:

  alfresco-ecm:
    build:
      context: ./modulos/alfresco-ecm
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  pega-bpm:
    build:
      context: ./modulos/pega-bpm
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  ccm:
    build:
      context: ./modulos/ccm
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  prestador:
